<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта Сервисов Минска</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }
        #map {
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    <script>
        const minskCoords = [53.9045, 27.5615];
        const map = L.map('map').setView(minskCoords, 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        const services = [
            { name: 'Ресторан "Гранд Кушавель"', coords: [53.9023, 27.5620] },
            { name: 'Кафе "Зерно"', coords: [53.9050, 27.5555] },
            { name: 'Аптека "Белфармация"', coords: [53.8999, 27.5690] },
            { name: 'Отделение "Беларусбанка"', coords: [53.9088, 27.5511] },
            { name: 'Станция метро "Площадь Ленина"', coords: [53.8942, 27.5480] }
        ];

        services.forEach(service => {
            L.marker(service.coords).addTo(map)
                .bindPopup(service.name);
        });

        L.marker(minskCoords).addTo(map)
            .bindPopup('Центр Минска')
            .openPopup();
    </script>
</body>
</html>
